<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 600" width="1280" height="600">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3ECF8E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1280" height="600" fill="#0A0F0A"/>

  <!-- ==================== LEFT: YOUR AGENT ==================== -->
  <text x="160" y="52" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, monospace" font-size="12" font-weight="400" fill="#888" letter-spacing="1">INPUT</text>

  <rect x="70" y="210" width="180" height="100" rx="14" fill="#1A1520" stroke="#6366F1" stroke-opacity="0.5" stroke-width="1"/>
  <text x="160" y="252" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16" font-weight="600" fill="#C7D2FE">Your agent</text>
  <text x="160" y="278" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#C7D2FE">Human or AI</text>

  <!-- Connection methods -->
  <text x="160" y="348" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#888">Connect via</text>

  <rect x="62" y="368" width="56" height="26" rx="5" fill="#1A1A18" stroke="#555" stroke-width="0.5"/>
  <text x="90" y="385" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#AAA">MCP</text>

  <rect x="152" y="368" width="56" height="26" rx="5" fill="#1A1A18" stroke="#555" stroke-width="0.5"/>
  <text x="180" y="385" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#AAA">SDK</text>

  <rect x="62" y="404" width="56" height="26" rx="5" fill="#1A1A18" stroke="#555" stroke-width="0.5"/>
  <text x="90" y="421" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#AAA">REST</text>

  <rect x="152" y="404" width="56" height="26" rx="5" fill="#1A1A18" stroke="#555" stroke-width="0.5"/>
  <text x="180" y="421" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#AAA">x402</text>

  <!-- Arrow: Agent → System R -->
  <line x1="250" y1="260" x2="370" y2="260" stroke="#3ECF8E" stroke-opacity="0.6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="310" y="248" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#3ECF8E" fill-opacity="0.7">API call</text>

  <!-- ==================== CENTER: SYSTEM R ==================== -->
  <text x="580" y="32" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" font-weight="400" fill="#888" letter-spacing="1">OPERATING SYSTEM</text>

  <!-- Main container -->
  <rect x="380" y="50" width="400" height="500" rx="18" fill="#0D1A15" stroke="#3ECF8E" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- System R title -->
  <text x="580" y="88" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18" font-weight="700" fill="#3ECF8E" letter-spacing="1">System R</text>

  <!-- Layer 1: Risk -->
  <rect x="410" y="112" width="340" height="48" rx="10" fill="#162010" stroke="#97C459" stroke-opacity="0.4" stroke-width="0.8"/>
  <text x="440" y="140" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#C0DD97">Risk</text>
  <text x="720" y="140" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#97C459" fill-opacity="0.8">12 tools</text>

  <!-- Layer 2: Intelligence -->
  <rect x="410" y="170" width="340" height="48" rx="10" fill="#0C1830" stroke="#85B7EB" stroke-opacity="0.4" stroke-width="0.8"/>
  <text x="440" y="198" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#B5D4F4">Intelligence</text>
  <text x="720" y="198" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#85B7EB" fill-opacity="0.8">11 tools</text>

  <!-- Layer 3: Analysis -->
  <rect x="410" y="228" width="340" height="48" rx="10" fill="#181430" stroke="#AFA9EC" stroke-opacity="0.4" stroke-width="0.8"/>
  <text x="440" y="256" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#CECBF6">Analysis</text>
  <text x="720" y="256" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#AFA9EC" fill-opacity="0.8">18 tools</text>

  <!-- Layer 4: Planning -->
  <rect x="410" y="286" width="340" height="48" rx="10" fill="#261C06" stroke="#EF9F27" stroke-opacity="0.4" stroke-width="0.8"/>
  <text x="440" y="314" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#FAC775">Planning</text>
  <text x="720" y="314" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#EF9F27" fill-opacity="0.8">4 tools</text>

  <!-- Layer 5: Execution -->
  <rect x="410" y="344" width="340" height="48" rx="10" fill="#2A1610" stroke="#F0997B" stroke-opacity="0.4" stroke-width="0.8"/>
  <text x="440" y="372" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#F5C4B3">Execution</text>
  <text x="720" y="372" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#F0997B" fill-opacity="0.8">25 brokers</text>

  <!-- Layer 6: Memory -->
  <rect x="410" y="402" width="340" height="48" rx="10" fill="#2A1220" stroke="#ED93B1" stroke-opacity="0.4" stroke-width="0.8"/>
  <text x="440" y="430" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#F4C0D1">Memory</text>
  <text x="720" y="430" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#ED93B1" fill-opacity="0.8">8 tools</text>

  <!-- Encryption badge -->
  <rect x="410" y="470" width="340" height="36" rx="8" fill="#1A1A18" stroke="#555" stroke-width="0.5"/>
  <text x="580" y="492" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#AAA">Encrypted  ·  Audited  ·  Isolated</text>

  <!-- ==================== RIGHT: MARKETS ==================== -->
  <text x="1020" y="82" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" font-weight="400" fill="#888" letter-spacing="1">MARKETS</text>

  <!-- Arrows: System R → Markets -->
  <line x1="780" y1="160" x2="900" y2="130" stroke="#3ECF8E" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="780" y1="230" x2="900" y2="210" stroke="#3ECF8E" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="780" y1="310" x2="900" y2="300" stroke="#3ECF8E" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="780" y1="370" x2="900" y2="390" stroke="#3ECF8E" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="780" y1="420" x2="900" y2="470" stroke="#3ECF8E" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Market: Equities -->
  <rect x="910" y="104" width="200" height="54" rx="10" fill="#261C06" stroke="#EF9F27" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="1010" y="126" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#FAC775">Equities</text>
  <text x="1010" y="146" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#EF9F27" fill-opacity="0.7">Stocks, ETFs</text>

  <!-- Market: Derivatives -->
  <rect x="910" y="186" width="200" height="54" rx="10" fill="#261C06" stroke="#EF9F27" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="1010" y="208" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#FAC775">Derivatives</text>
  <text x="1010" y="228" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#EF9F27" fill-opacity="0.7">Options, Futures</text>

  <!-- Market: Crypto -->
  <rect x="910" y="268" width="200" height="54" rx="10" fill="#261C06" stroke="#EF9F27" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="1010" y="290" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#FAC775">Crypto</text>
  <text x="1010" y="310" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#EF9F27" fill-opacity="0.7">CEX, DEX, Perps</text>

  <!-- Market: Forex -->
  <rect x="910" y="350" width="200" height="54" rx="10" fill="#261C06" stroke="#EF9F27" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="1010" y="372" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#FAC775">Forex</text>
  <text x="1010" y="392" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#EF9F27" fill-opacity="0.7">Currency pairs</text>

  <!-- Market: Prediction -->
  <rect x="910" y="432" width="200" height="54" rx="10" fill="#261C06" stroke="#EF9F27" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="1010" y="454" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#FAC775">Prediction</text>
  <text x="1010" y="474" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#EF9F27" fill-opacity="0.7">Markets, Events</text>

  <!-- ==================== RETURN PATH (dashed) ==================== -->
  <!-- Routes from System R bottom, through the channel between the 4 connection blocks, up to agent -->
  <path d="M380 488 L135 488 L135 310" fill="none" stroke="#3ECF8E" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#arrow-dash)"/>
  <text x="260" y="504" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#3ECF8E" fill-opacity="0.6">Results + memory</text>

</svg>
