  <rect x="90" y="208" width="250" height="68" rx="8" fill="#111118" stroke="#3ECF8E" stroke-opacity="0.15" stroke-width="1"/>
  <text x="215" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F0F0F0">Risk</text>
  <text x="215" y="252" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#888">G-formula · Iron Fist · Kill switches</text>
  <text x="215" y="268" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#3ECF8E" fill-opacity="0.7">12 tools</text>

  <rect x="375" y="208" width="250" height="68" rx="8" fill="#111118" stroke="#3ECF8E" stroke-opacity="0.15" stroke-width="1"/>
  <text x="500" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F0F0F0">Intelligence</text>
  <text x="500" y="252" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#888">Regime · Patterns · Breaks · Greeks</text>
  <text x="500" y="268" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#3ECF8E" fill-opacity="0.7">11 tools</text>

