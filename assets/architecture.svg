  <text x="30" y="300" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#3ECF8E" fill-opacity="0.4" transform="rotate(-90 30 300)">ENCRYPTED · AUDITED · COMPLIANT</text>
  <text x="970" y="300" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#3ECF8E" fill-opacity="0.4" transform="rotate(90 970 300)">PER-AGENT ISOLATION · ZERO TRUST</text>

  <!-- Bottom accent -->
  <rect x="0" y="516" width="1000" height="4" rx="0 0 12 12" fill="#3ECF8E" fill-opacity="0.4"/>
</svg>
