  </defs>

  <!-- Background -->
  <rect width="1000" height="520" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#888" letter-spacing="3">HOW SYSTEM R WORKS</text>

  <!-- === TOP: YOUR AI AGENT === -->
  <rect x="300" y="58" width="400" height="64" rx="10" fill="url(#agentGrad)" stroke="#6366F1" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="500" y="84" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#A5B4FC">YOUR AI AGENT</text>
  <text x="500" y="108" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#6366F1" fill-opacity="0.8">Claude  ·  GPT  ·  Llama  ·  Mistral  ·  Custom</text>

  <!-- Arrow down -->
  <line x1="500" y1="122" x2="500" y2="152" stroke="#3ECF8E" stroke-opacity="0.5" stroke-width="1.5"/>
  <polygon points="494,148 500,158 506,148" fill="#3ECF8E" fill-opacity="0.5"/>
  <text x="530" y="143" font-family="ui-monospace, monospace" font-size="10" fill="#3ECF8E" fill-opacity="0.7">MCP / REST</text>

