  <text x="215" y="336" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#888">Options · Futures · Multi-leg · Spreads</text>
  <text x="215" y="352" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#3ECF8E" fill-opacity="0.7">4 tools</text>

