  <text x="500" y="316" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F0F0F0">Execution</text>
  <text x="500" y="336" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#888">Equities · Options · Futures · Crypto · FX</text>
  <text x="500" y="352" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#3ECF8E" fill-opacity="0.7">25 brokers</text>

  <rect x="660" y="292" width="250" height="68" rx="8" fill="#111118" stroke="#3ECF8E" stroke-opacity="0.15" stroke-width="1"/>
  <text x="785" y="316" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F0F0F0">Memory</text>
  <text x="785" y="336" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#888">Fingerprint · Biases · Predict · Journal</text>
  <text x="785" y="352" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#3ECF8E" fill-opacity="0.7">8 tools</text>

