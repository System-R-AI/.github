  <rect x="410" y="470" width="340" height="36" rx="8" fill="#F5F5F4" stroke="#D4D4D4" stroke-width="0.5"/>
  <text x="580" y="492" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#666">Encrypted  ·  Audited  ·  Isolated</text>

