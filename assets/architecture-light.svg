  <line x1="780" y1="160" x2="900" y2="130" stroke="#0E8A5F" stroke-opacity="0.35" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="780" y1="230" x2="900" y2="210" stroke="#0E8A5F" stroke-opacity="0.35" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="780" y1="310" x2="900" y2="300" stroke="#0E8A5F" stroke-opacity="0.35" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="780" y1="370" x2="900" y2="390" stroke="#0E8A5F" stroke-opacity="0.35" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="780" y1="420" x2="900" y2="470" stroke="#0E8A5F" stroke-opacity="0.35" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Market: Equities -->
  <rect x="910" y="104" width="200" height="54" rx="10" fill="#FEF6E7" stroke="#C27D0A" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="1010" y="126" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#8A5A06">Equities</text>
  <text x="1010" y="146" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#C27D0A">Stocks, ETFs</text>

  <!-- Market: Derivatives -->
  <rect x="910" y="186" width="200" height="54" rx="10" fill="#FEF6E7" stroke="#C27D0A" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="1010" y="208" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#8A5A06">Derivatives</text>
  <text x="1010" y="228" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#C27D0A">Options, Futures</text>

  <!-- Market: Crypto -->
  <rect x="910" y="268" width="200" height="54" rx="10" fill="#FEF6E7" stroke="#C27D0A" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="1010" y="290" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#8A5A06">Crypto</text>
  <text x="1010" y="310" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#C27D0A">CEX, DEX, Perps</text>

  <!-- Market: Forex -->
  <rect x="910" y="350" width="200" height="54" rx="10" fill="#FEF6E7" stroke="#C27D0A" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="1010" y="372" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#8A5A06">Forex</text>
  <text x="1010" y="392" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#C27D0A">Currency pairs</text>

  <!-- Market: Prediction -->
  <rect x="910" y="432" width="200" height="54" rx="10" fill="#FEF6E7" stroke="#C27D0A" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="1010" y="454" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#8A5A06">Prediction</text>
  <text x="1010" y="474" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#C27D0A">Markets, Events</text>

  <!-- ==================== RETURN PATH (dashed) ==================== -->
  <path d="M380 520 L160 520 L160 310" fill="none" stroke="#0E8A5F" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#arrow-dash)"/>
  <text x="270" y="540" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#0E8A5F" fill-opacity="0.6">Results + memory</text>

</svg>
