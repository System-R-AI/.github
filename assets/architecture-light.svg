  <text x="440" y="198" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#1E5A80">Intelligence</text>
  <text x="720" y="198" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#3B82B0">11 tools</text>

