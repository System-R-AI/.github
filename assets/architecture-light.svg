  <text x="440" y="256" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#4338CA">Analysis</text>
  <text x="720" y="256" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#6366F1">18 tools</text>

  <!-- Layer 4: Planning -->
  <rect x="410" y="286" width="340" height="48" rx="10" fill="#FEF6E7" stroke="#C27D0A" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="440" y="314" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#8A5A06">Planning</text>
  <text x="720" y="314" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#C27D0A">4 tools</text>

  <!-- Layer 5: Execution -->
  <rect x="410" y="344" width="340" height="48" rx="10" fill="#FEF0EB" stroke="#C0603A" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="440" y="372" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#8A3E1E">Execution</text>
  <text x="720" y="372" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#C0603A">25 brokers</text>

  <!-- Layer 6: Memory -->
  <rect x="410" y="402" width="340" height="48" rx="10" fill="#FDF0F5" stroke="#C0507A" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="440" y="430" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#8A2E52">Memory</text>
  <text x="720" y="430" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#C0507A">8 tools</text>

