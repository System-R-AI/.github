  <text x="580" y="32" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" font-weight="400" fill="#999" letter-spacing="1">OPERATING SYSTEM</text>

  <!-- Main container -->
  <rect x="380" y="50" width="400" height="500" rx="18" fill="#F0FAF5" stroke="#0E8A5F" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- System R title -->
  <text x="580" y="88" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18" font-weight="700" fill="#0E8A5F" letter-spacing="1">System R</text>

  <!-- Layer 1: Risk -->
  <rect x="410" y="112" width="340" height="48" rx="10" fill="#F0F9E8" stroke="#5A8A2F" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="440" y="140" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="600" fill="#3D6B1A">Risk</text>
  <text x="720" y="140" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#5A8A2F">12 tools</text>

