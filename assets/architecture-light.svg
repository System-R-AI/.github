<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 600" width="1280" height="600">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0E8A5F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1280" height="600" fill="#FAFAFA"/>

  <!-- ==================== LEFT: YOUR AGENT ==================== -->
  <text x="160" y="52" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, monospace" font-size="12" font-weight="400" fill="#999" letter-spacing="1">INPUT</text>

  <rect x="70" y="210" width="180" height="100" rx="14" fill="#F0EEFF" stroke="#6366F1" stroke-opacity="0.4" stroke-width="1"/>
  <text x="160" y="252" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16" font-weight="600" fill="#4338CA">Your agent</text>
  <text x="160" y="278" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#6366F1" fill-opacity="0.7">Human or AI</text>

  <!-- Connection methods -->
  <text x="160" y="348" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#999">Connect via</text>

  <rect x="72" y="368" width="58" height="26" rx="5" fill="#F5F5F4" stroke="#D4D4D4" stroke-width="0.5"/>
  <text x="101" y="385" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#666">MCP</text>

  <rect x="138" y="368" width="58" height="26" rx="5" fill="#F5F5F4" stroke="#D4D4D4" stroke-width="0.5"/>
  <text x="167" y="385" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#666">SDK</text>

  <rect x="72" y="402" width="58" height="26" rx="5" fill="#F5F5F4" stroke="#D4D4D4" stroke-width="0.5"/>
  <text x="101" y="419" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#666">REST</text>

  <rect x="138" y="402" width="58" height="26" rx="5" fill="#F5F5F4" stroke="#D4D4D4" stroke-width="0.5"/>
  <text x="167" y="419" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#666">x402</text>

  <!-- Arrow: Agent → System R -->
  <line x1="250" y1="260" x2="370" y2="260" stroke="#0E8A5F" stroke-opacity="0.6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="310" y="248" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#0E8A5F" fill-opacity="0.8">API call</text>

