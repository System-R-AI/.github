<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 340" width="1000" height="340">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#0A0F12"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="340" rx="12" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#888" letter-spacing="3">ONE API CALL — WHAT HAPPENS INSIDE</text>

  <!-- Step 1: Agent calls pre_trade_gate -->
  <rect x="30" y="58" width="185" height="52" rx="8" fill="#111118" stroke="#6366F1" stroke-opacity="0.4" stroke-width="1.2"/>
  <text x="122" y="78" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#A5B4FC">pre_trade_gate()</text>
  <text x="122" y="98" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#6366F1" fill-opacity="0.6">AAPL · long · $185.50</text>

  <!-- Arrow -->
  <line x1="215" y1="84" x2="240" y2="84" stroke="#3ECF8E" stroke-opacity="0.4" stroke-width="1.2"/>
  <polygon points="236,80 244,84 236,88" fill="#3ECF8E" fill-opacity="0.5"/>

  <!-- Step 2: Intelligence -->
  <rect x="245" y="58" width="145" height="52" rx="8" fill="#111118" stroke="#3ECF8E" stroke-opacity="0.2" stroke-width="1"/>
  <text x="317" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#3ECF8E">Intelligence</text>
  <text x="317" y="96" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#888">regime: TRENDING_UP</text>

  <!-- Arrow -->
  <line x1="390" y1="84" x2="415" y2="84" stroke="#3ECF8E" stroke-opacity="0.4" stroke-width="1.2"/>
  <polygon points="411,80 419,84 411,88" fill="#3ECF8E" fill-opacity="0.5"/>

  <!-- Step 3: Risk -->
  <rect x="420" y="58" width="145" height="52" rx="8" fill="#111118" stroke="#3ECF8E" stroke-opacity="0.2" stroke-width="1"/>
  <text x="492" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#3ECF8E">Risk</text>
  <text x="492" y="96" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#888">G-formula: 363 shares</text>

  <!-- Arrow -->
  <line x1="565" y1="84" x2="590" y2="84" stroke="#3ECF8E" stroke-opacity="0.4" stroke-width="1.2"/>
  <polygon points="586,80 594,84 586,88" fill="#3ECF8E" fill-opacity="0.5"/>

  <!-- Step 4: Analysis -->
  <rect x="595" y="58" width="145" height="52" rx="8" fill="#111118" stroke="#3ECF8E" stroke-opacity="0.2" stroke-width="1"/>
  <text x="667" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#3ECF8E">Analysis</text>
  <text x="667" y="96" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#888">risk_score: 23/100</text>

  <!-- Arrow -->
  <line x1="740" y1="84" x2="765" y2="84" stroke="#3ECF8E" stroke-opacity="0.4" stroke-width="1.2"/>
  <polygon points="761,80 769,84 761,88" fill="#3ECF8E" fill-opacity="0.5"/>

  <!-- Step 5: Result -->
  <rect x="770" y="58" width="200" height="52" rx="8" fill="#111118" stroke="#3ECF8E" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="870" y="78" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#3ECF8E">APPROVED</text>
  <text x="870" y="96" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#888">363 shares · $0.01</text>

  <!-- Second row: The response JSON -->
  <rect x="60" y="135" width="880" height="170" rx="8" fill="#111118" stroke="#222230" stroke-width="1"/>

  <!-- Window dots -->
  <circle cx="80" cy="152" r="5" fill="#FF5F57"/>
  <circle cx="96" cy="152" r="5" fill="#FEBC2E"/>
  <circle cx="112" cy="152" r="5" fill="#28C840"/>
  <text x="500" y="156" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#555">response</text>

  <!-- JSON response -->
  <text x="80" y="180" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#888">{</text>
  <text x="100" y="198" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#888">"gate_passed": </text>
  <text x="247" y="198" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#3ECF8E">true</text>
  <text x="271" y="198" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#888">,</text>

  <text x="100" y="218" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#888">"sizing":  { "shares": </text>
  <text x="310" y="218" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#E5C07B">363</text>
  <text x="335" y="218" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#888">, "risk_amount": </text>
  <text x="487" y="218" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#E5C07B">"$1,996.50"</text>
  <text x="575" y="218" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#888">, "notional": </text>
  <text x="700" y="218" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#E5C07B">"$67,366.50"</text>
  <text x="800" y="218" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#888"> },</text>

  <text x="100" y="238" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#888">"risk":    { "approved": </text>
  <text x="323" y="238" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#3ECF8E">true</text>
  <text x="348" y="238" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#888">, "score": </text>
  <text x="440" y="238" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#E5C07B">23</text>
  <text x="458" y="238" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#888">, "errors": </text>
  <text x="560" y="238" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#888">[], "warnings": [] },</text>

  <text x="100" y="258" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#888">"system": { "g": </text>
  <text x="264" y="258" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#E5C07B">1.12</text>
  <text x="300" y="258" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#888">, "verdict": </text>
  <text x="405" y="258" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#E5C07B">"HEALTHY"</text>
  <text x="485" y="258" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#888"> }</text>

  <text x="80" y="278" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#888">}</text>

  <!-- Cost label -->
  <rect x="870" y="275" width="58" height="22" rx="11" fill="#3ECF8E" fill-opacity="0.12" stroke="#3ECF8E" stroke-opacity="0.3" stroke-width="1"/>
  <text x="899" y="290" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#3ECF8E">$0.01</text>

  <!-- Bottom accent -->
  <rect x="0" y="336" width="1000" height="4" rx="0 0 12 12" fill="#3ECF8E" fill-opacity="0.4"/>
</svg>
