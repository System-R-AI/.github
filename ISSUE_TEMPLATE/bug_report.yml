name: Bug Report
description: Report a bug with the System R SDK or API
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Before filing, please check [docs.systemr.ai](https://docs.systemr.ai) and existing issues.
  - type: input
    id: sdk-version
    attributes:
      label: SDK Version
      description: "Output of `pip show systemr`"
      placeholder: "2.2.0"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: "Output of `python --version`"
      placeholder: "3.11.0"
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - SDK / Client
        - API / Endpoints
        - MCP Integration
        - Broker Connection
        - Billing
        - Authentication
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code to trigger the bug.
      render: python
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: Error output
      description: Full error message or traceback.
      render: text
